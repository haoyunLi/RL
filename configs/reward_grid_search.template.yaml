run:
  name: human_colorectal_reward_grid_search
  output_root: runs
  seed: 7
  max_episodes: 500

inputs:
  # This is auto-updated by jobs/run_episode_build_and_reward_grid_search.sbatch.
  episodes_index_path: runs/example_episode_build_run/episodes_index.csv
  reference:
    path: workspace_outputs/human_colorectal/intermediate/reference_sct/reference_counts_sct_tumor_aligned_hd_overlap_unique.npz
    format: npz
    cell_type_column: null
    gene_mode: all
    gene_prefix: null
    gene_columns: []
    array_key: reference_counts
  nuclei:
    path: workspace_outputs/human_colorectal/intermediate/human_colorectal_nuclei.parquet
    format: auto
    columns:
      cell_id: cell_id
      center_x_um: center_x_um
      center_y_um: center_y_um

reward:
  objective: mean_return
  epsilon: 1.0e-8
  r_max_um: 80.0
  normalize_expression_zscore: false
  zscore_delta: 1.0e-8

search:
  w1:
    start: 0.1
    stop: 1.0
    step: 0.1
  w2:
    start: 0.1
    stop: 1.0
    step: 0.1
  w3:
    start: 0.1
    stop: 1.0
    step: 0.1
  stop_lambda:
    start: 0.1
    stop: 1.0
    step: 0.1
