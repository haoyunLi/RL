run:
  name: human_colorectal_reward_grid_search
  output_root: runs
  seed: 7
  max_episodes: 500
  n_workers: 64

inputs:
  # This is auto-updated by jobs/run_reward_grid_search.sbatch.
  episodes_index_path: runs/example_episode_build_run/episodes_index.csv
  reference:
    path: workspace_outputs/pseudo_human_colorectal/intermediate/reference_sct/reference_counts_sct_tumor_aligned_hd_overlap_unique.npz
    format: npz
    genes_key: genes
    cell_type_column: null
    gene_mode: all
    gene_prefix: null
    gene_columns: []
    array_key: reference_counts
  nuclei:
    path: workspace_outputs/pseudo_human_colorectal/intermediate/human_colorectal_nuclei.parquet
    format: auto
    columns:
      cell_id: cell_id
      center_x_um: center_x_um
      center_y_um: center_y_um

reward:
  objective: gt_shape
  epsilon: 1.0e-8
  r_max_um: 20.0
  normalize_expression_zscore: true
  zscore_delta: 1.0e-8
  w4: 0.0
  stop_stat: topk_mean
  stop_top_k: 3

supervised:
  # This is auto-updated by jobs/run_reward_grid_search.sbatch.
  eval_csv_path: runs/example_ppo_eval_run/per_episode.csv
  gt_cell_bins_path: workspace_outputs/pseudo_human_colorectal/intermediate/cropped_visium_hd_human_colorectal_pseudo_square_002um_cell_bins.csv.gz
  selection_mode: overgrowth_only
  require_match_method: nuclear_overlap
  overgrowth_ratio_threshold: 1.4
  max_selected_episodes: 200
  target_size_ratio: 1.15
  oversize_penalty_weight: 1.0
  size_ratio_filter_min: 1.0
  size_ratio_filter_max: 1.2

search:
  w1:
    start: 0.1
    stop: 1.0
    step: 0.1
  w2:
    start: 0.1
    stop: 1.0
    step: 0.1
  w3:
    start: 0.1
    stop: 1.0
    step: 0.1
  w4:
    start: 0.0
    stop: 0.3
    step: 0.1
  stop_lambda:
    start: 0.1
    stop: 1.0
    step: 0.1
