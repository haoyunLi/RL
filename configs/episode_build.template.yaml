run:
  # Free-form run name; output folder becomes: <output_root>/<name>_<UTC timestamp>
  name: human_colorectal_episode_build
  output_root: runs
  # Seed is used for any optional row sampling (debug limits).
  seed: 42

inputs:
  # Current generated paths in this workspace.
  nuclei_path: workspace_outputs/pseudo_human_colorectal/intermediate/human_colorectal_nuclei.parquet
  bins_path: workspace_outputs/pseudo_human_colorectal/intermediate/square_002um_filtered_nuclear/human_colorectal_square_002um_filtered_rl.metadata.parquet

  # One of: auto, csv, tsv, parquet
  nuclei_format: auto
  bins_format: auto

  nuclei_columns:
    cell_id: cell_id
    center_x_um: center_x_um
    center_y_um: center_y_um
    radius_um: radius_um
    # Set to null if not available yet.
    cell_type: null

  bin_columns:
    bin_id: bin_id
    x_um: x_um
    y_um: y_um

  expression:
    # Real expression mode: load from a 10x matrix source via bins.matrix_col_index.
    # This may be a .h5 file or a 10x matrix directory; directory inputs are
    # resolved to a cached CSC H5 automatically when needed.
    # Gene order is taken from the aligned reference NPZ so reward dims match.
    mode: matrix_h5
    prefix: null
    columns: []
    matrix_path: colorectal_pseudo_visium_hd_output_full_0.25/filtered_feature_bc_matrix
    matrix_col_index_column: matrix_col_index
    reference_npz_path: workspace_outputs/pseudo_human_colorectal/intermediate/reference_sct/reference_counts_sct_tumor_aligned_hd_overlap_unique.npz
    reference_genes_key: genes
    filter_empty_nuclear_cells: true
    min_nuclear_expression_sum: 0.0
    nuclei_chunk_size: 256
    cache_size: 8000
    n_workers: 8
    # Used only when artifact_layout=single_npz.
    save_compressed: true
    # Recommended for large matrix-backed runs: one shard directory per nuclei chunk.
    artifact_layout: sharded_npy

environment:
  max_center_distance_um: 20.0
  radius_band_um: 20.0
  strict_action_validation: true
  # null means resolve automatically from number of candidate bins.
  max_steps: null
  default_steps_multiplier: 3
